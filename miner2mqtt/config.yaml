name: "Miner 2 MQTT"
description: "Interface bitcoin miner ASICs to MQTT"
version: "1.0.10"
slug: "miner2mqtt"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  mqtt_server: "server.local"
  mqtt_port: 1883
  mqtt_user: "username"
  mqtt_password: "password"
  mqtt_prefix: "mqtt/prefix"
  miner_subnet: "192.168.0.1/24"
schema:
  mqtt_server: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  mqtt_prefix: str
  miner_subnet: str
